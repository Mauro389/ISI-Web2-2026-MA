<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Equipos - MA</title>
</head>
<body>

    <h1>Gestión de Equipos</h1>

    <div>
        <input type="text" id="inp-nombre" placeholder="Nombre del equipo" />
        <input type="text" id="inp-desc" placeholder="Descripción" />
        <button id="btn-agregar">+ Agregar</button>
    </div>

    <table border="1" cellpadding="6" style="border-collapse:collapse; margin-top:12px; width:100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Miembros</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script type="module" src="./index.js"></script>
</body>
</html>
